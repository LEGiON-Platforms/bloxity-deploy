name: 'Bloxity Deploy'
description: 'Build a game client (Unity WebGL or a web/three.js bundle) + a Docker backend and ship BOTH to Bloxity Legion from one token.'
author: 'Bloxity'
branding:
  icon: 'upload-cloud'
  color: 'blue'

# The ONLY required input is the deploy token. game id, URLs and image name are all
# derived from it; frontend + backend get the same version so the dashboard shows them
# matched. Pick the client engine; the server half (Docker -> ghcr -> Legion) is the
# same for everyone.
#
#   engine: unity     (default) build a Unity WebGL client via game-ci. License is
#                     Bloxity-managed (fetched with the token) — configure nothing.
#   engine: web       a JS/web client (three.js, vite, etc.): run a build command and
#                     upload its output dir.
#   engine: prebuilt  you already built the static client — just point at the dir.
#
# Calling workflow needs: permissions: { contents: read, packages: write }.

inputs:
  deploy-token:
    description: 'Per-game deploy token (lgn_...). The only required input.'
    required: true
  channel:
    description: "prod or dev. Default: derive from branch (main -> prod, else dev)."
    required: false
    default: ''
  version:
    description: 'Version label stamped on BOTH halves. Default: short commit SHA.'
    required: false
    default: ''

  # ---- client ----
  engine:
    description: 'Client engine: unity (default) | web (three.js/vite/any JS bundler) | prebuilt.'
    required: false
    default: 'unity'
  skip-client:
    description: 'Set true to deploy only the backend.'
    required: false
    default: 'false'
  client-path:
    description: 'Client project root (Unity project, or the web project to build).'
    required: false
    default: '.'
  client-dist:
    description: 'Built static dir to upload. web: relative to client-path (default dist). prebuilt: the dir to upload (REQUIRED). unity: ignored.'
    required: false
    default: ''

  # ---- engine: unity ----
  unity-version:
    description: "Unity version, or 'auto' to read ProjectSettings/ProjectVersion.txt."
    required: false
    default: 'auto'
  build-target:
    description: 'Unity build target. Keep WebGL for a browser client.'
    required: false
    default: 'WebGL'

  # ---- engine: web ----
  client-build-command:
    description: 'Build command run in client-path (engine: web).'
    required: false
    default: 'npm ci && npm run build'
  node-version:
    description: 'Node version for the web build (engine: web).'
    required: false
    default: '20'

  # ---- server (Docker) ----
  skip-server:
    description: 'Set true to deploy only the frontend.'
    required: false
    default: 'false'
  server-path:
    description: 'Directory containing the backend Dockerfile (the build context).'
    required: false
    default: 'Server'
  server-dockerfile:
    description: 'Path to the Dockerfile. Default: <server-path>/Dockerfile.'
    required: false
    default: ''

  # ---- endpoints (rarely changed) ----
  api-url:
    description: 'Bloxity api base.'
    required: false
    default: 'https://api.bloxity.io'
  legion-url:
    description: 'Bloxity Legion base.'
    required: false
    default: 'https://legion.bloxity.io'

runs:
  using: 'composite'
  steps:
    - id: meta
      shell: bash
      run: |
        set -euo pipefail
        # Resolve the game from the token alone — no gameId input needed.
        gid=$(curl -fsS --retry 3 --retry-delay 3 --retry-all-errors "${{ inputs.api-url }}/v1/hosting/resolve" \
          -H "Authorization: Bearer ${{ inputs.deploy-token }}" | jq -r '.gameId // empty')
        if [ -z "$gid" ]; then
          echo "::error::Could not resolve a game from the deploy token. Is it set and valid?"
          exit 1
        fi
        ch='${{ inputs.channel }}'
        if [ -z "$ch" ]; then [ "$GITHUB_REF_NAME" = "main" ] && ch=prod || ch=dev; fi
        ver='${{ inputs.version }}'; [ -z "$ver" ] && ver="${GITHUB_SHA::7}"
        owner="${GITHUB_REPOSITORY_OWNER,,}"   # ghcr requires a lowercase owner
        # Normalise the engine (accept friendly aliases).
        eng="${{ inputs.engine }}"; eng="${eng,,}"
        case "$eng" in
          ''|unity) eng=unity ;;
          web|threejs|three|three.js|vite|js|html) eng=web ;;
          prebuilt|static|none) eng=prebuilt ;;
          *) echo "::error::unknown engine '$eng' (use: unity | web | prebuilt)"; exit 1 ;;
        esac
        echo "engine=$eng" >> "$GITHUB_OUTPUT"
        echo "game-id=$gid" >> "$GITHUB_OUTPUT"
        echo "channel=$ch" >> "$GITHUB_OUTPUT"
        echo "version=$ver" >> "$GITHUB_OUTPUT"
        echo "image=ghcr.io/${owner}/${gid}-server:${ch}-${ver}" >> "$GITHUB_OUTPUT"
        echo "host=$([ "$ch" = prod ] && echo host || echo dev.host)" >> "$GITHUB_OUTPUT"
        echo "play=$([ "$ch" = prod ] && echo play || echo dev.play)" >> "$GITHUB_OUTPUT"
        echo "Bloxity deploy: $gid ($ch) v$ver  [client engine: $eng]"

    # ---------- CLIENT (engine: unity) ----------
    # Bloxity holds the Unity license; fetch it with the token so the build activates
    # with no dev config. Falls back to any UNITY_LICENSE/UNITY_SERIAL the caller set.
    - name: Fetch managed Unity license
      if: ${{ inputs.skip-client != 'true' && steps.meta.outputs.engine == 'unity' }}
      shell: bash
      run: |
        set -euo pipefail
        code=$(curl -sS -o /tmp/bloxlic.json -w '%{http_code}' \
          "${{ inputs.api-url }}/v1/hosting/unity-license" \
          -H "Authorization: Bearer ${{ inputs.deploy-token }}" || echo 000)
        if [ "$code" != "200" ]; then
          echo "::notice::No Bloxity-managed Unity license (HTTP $code); using any UNITY_LICENSE/UNITY_SERIAL you set yourself."
          rm -f /tmp/bloxlic.json; exit 0
        fi
        lic=$(jq -r '.license // empty' /tmp/bloxlic.json)
        serial=$(jq -r '.serial // empty' /tmp/bloxlic.json)
        email=$(jq -r '.email // empty' /tmp/bloxlic.json)
        pass=$(jq -r '.password // empty' /tmp/bloxlic.json)
        rm -f /tmp/bloxlic.json
        [ -n "$serial" ] && echo "::add-mask::$serial"
        [ -n "$pass" ] && echo "::add-mask::$pass"
        if [ -n "$serial" ]; then
          echo "UNITY_SERIAL=$serial" >> "$GITHUB_ENV"
        elif [ -n "$lic" ]; then
          echo "::add-mask::$lic"
          { echo "UNITY_LICENSE<<__BLOX_LIC_EOF__"; printf '%s\n' "$lic"; echo "__BLOX_LIC_EOF__"; } >> "$GITHUB_ENV"
        else
          echo "::error::Managed license response had neither a serial nor a license file."; exit 1
        fi
        [ -n "$email" ] && echo "UNITY_EMAIL=$email" >> "$GITHUB_ENV"
        [ -n "$pass" ] && echo "UNITY_PASSWORD=$pass" >> "$GITHUB_ENV"
        echo "Using the Bloxity-managed Unity license."

    - name: Build Unity client
      if: ${{ inputs.skip-client != 'true' && steps.meta.outputs.engine == 'unity' }}
      uses: game-ci/unity-builder@v4
      with:
        projectPath: ${{ inputs.client-path }}
        unityVersion: ${{ inputs.unity-version }}
        targetPlatform: ${{ inputs.build-target }}
        buildName: ${{ inputs.build-target }}
        buildsPath: bloxity-build

    # ---------- CLIENT (engine: web) ----------
    - name: Set up Node
      if: ${{ inputs.skip-client != 'true' && steps.meta.outputs.engine == 'web' }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Build web client
      if: ${{ inputs.skip-client != 'true' && steps.meta.outputs.engine == 'web' }}
      shell: bash
      working-directory: ${{ inputs.client-path }}
      run: |
        set -euo pipefail
        ${{ inputs.client-build-command }}

    # ---------- CLIENT: zip the built dir + upload (all engines) ----------
    - name: Zip + upload client
      if: ${{ inputs.skip-client != 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        case "${{ steps.meta.outputs.engine }}" in
          unity)
            out="bloxity-build/${{ inputs.build-target }}/${{ inputs.build-target }}" ;;
          web)
            d='${{ inputs.client-dist }}'; [ -z "$d" ] && d=dist
            out="${{ inputs.client-path }}/$d" ;;
          prebuilt)
            out='${{ inputs.client-dist }}'
            [ -z "$out" ] && { echo "::error::engine=prebuilt needs client-dist (the built dir to upload)"; exit 1; } ;;
        esac
        if [ ! -f "$out/index.html" ]; then
          echo "::error::No index.html in the client output ($out). Tree:"; ls -R "$out" 2>/dev/null | head -40 || true; exit 1
        fi
        ( cd "$out" && zip -qr "$GITHUB_WORKSPACE/bloxity-client.zip" . )
        echo "Client zip: $(du -h bloxity-client.zip | cut -f1)"
        code=$(curl -sS --retry 3 --retry-delay 3 --retry-all-errors -o /tmp/fe.json -w '%{http_code}' -X POST \
          "${{ inputs.api-url }}/v1/hosting/games/${{ steps.meta.outputs.game-id }}/frontend?channel=${{ steps.meta.outputs.channel }}&version=${{ steps.meta.outputs.version }}" \
          -H "Authorization: Bearer ${{ inputs.deploy-token }}" \
          -H "Content-Type: application/zip" \
          --data-binary @bloxity-client.zip)
        echo "frontend upload HTTP $code: $(cat /tmp/fe.json)"
        [ "$code" = "200" ] || { echo "::error::frontend upload failed"; exit 1; }
        echo "Frontend -> https://${{ steps.meta.outputs.game-id }}.${{ steps.meta.outputs.play }}.bloxity.io"

    # ---------- SERVER: Docker -> ghcr -> tell Legion to roll it ----------
    - name: Log in to ghcr
      if: ${{ inputs.skip-server != 'true' }}
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Set up Buildx
      if: ${{ inputs.skip-server != 'true' }}
      uses: docker/setup-buildx-action@v3

    - name: Build + push server image
      if: ${{ inputs.skip-server != 'true' }}
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.server-path }}
        file: ${{ inputs.server-dockerfile != '' && inputs.server-dockerfile || format('{0}/Dockerfile', inputs.server-path) }}
        push: true
        tags: ${{ steps.meta.outputs.image }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy server to Legion
      if: ${{ inputs.skip-server != 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        body=$(jq -nc \
          --arg c '${{ steps.meta.outputs.channel }}' \
          --arg i '${{ steps.meta.outputs.image }}' \
          --arg v '${{ steps.meta.outputs.version }}' \
          '{channel:$c, image:$i, version:$v}')
        curl -fsS --retry 4 --retry-delay 5 --retry-all-errors --retry-connrefused -X POST "${{ inputs.legion-url }}/v1/apps/${{ steps.meta.outputs.game-id }}/deploy" \
          -H "Authorization: Bearer ${{ inputs.deploy-token }}" \
          -H 'Content-Type: application/json' \
          -d "$body"
        echo ""
        echo "Backend -> https://${{ steps.meta.outputs.game-id }}.${{ steps.meta.outputs.host }}.bloxity.io/health"

    - name: Summary
      if: ${{ always() && steps.meta.outputs.game-id != '' }}
      shell: bash
      run: |
        {
          echo "### Bloxity deploy: ${{ steps.meta.outputs.game-id }} (${{ steps.meta.outputs.channel }}) v${{ steps.meta.outputs.version }}"
          [ "${{ inputs.skip-server }}" != "true" ] && echo "- backend: https://${{ steps.meta.outputs.game-id }}.${{ steps.meta.outputs.host }}.bloxity.io"
          [ "${{ inputs.skip-client }}" != "true" ] && echo "- frontend: https://${{ steps.meta.outputs.game-id }}.${{ steps.meta.outputs.play }}.bloxity.io"
        } >> "$GITHUB_STEP_SUMMARY"
